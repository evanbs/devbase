services:
  app:
    # No projeto derivado, descomente 'build' se precisar customizar a imagem base localmente
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    image: ghcr.io/evanbs/devbase:latest
    command: sleep infinity
    volumes:
      - ..:/workspace:cached

  dynamodb:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data/"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data/

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devlocal
      MINIO_ROOT_PASSWORD: devlocal
    volumes:
      - minio_data:/data

volumes:
  dynamodb_data:
  minio_data:
